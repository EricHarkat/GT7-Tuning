<div class="page">
  <header class="page-header">
    <div>
      <h1>GT7 Cars</h1>
      <p>Liste des voitures Gran Turismo 7</p>
    </div>
  </header>

  <table mat-table [dataSource]="cars()" class="cars-table mat-elevation-z2">
    <ng-container matColumnDef="image">
      <th mat-header-cell *matHeaderCellDef>Image</th>
      <td mat-cell *matCellDef="let car">
        @if (car.imageUrl) {
          <img class="car-thumb" [src]="car.imageUrl" [alt]="car.name" />
        }
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nom</th>
      <td mat-cell *matCellDef="let car">{{ car.name }}</td>
    </ng-container>

    <ng-container matColumnDef="manufacturer">
      <th mat-header-cell *matHeaderCellDef>Constructeur</th>
      <td mat-cell *matCellDef="let car">{{ car.manufacturer }}</td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Catégorie</th>
      <td mat-cell *matCellDef="let car">{{ car.category || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="engineType">
      <th mat-header-cell *matHeaderCellDef>Moteur</th>
      <td mat-cell *matCellDef="let car">{{ car.engineType || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="drivetrain">
      <th mat-header-cell *matHeaderCellDef>Transmission</th>
      <td mat-cell *matCellDef="let car">{{ car.normalized?.drivetrain || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="pp">
      <th mat-header-cell *matHeaderCellDef>PP</th>
      <td mat-cell *matCellDef="let car">{{ car.normalized?.pp || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="details">
      <th mat-header-cell *matHeaderCellDef>Détails</th>
      <td mat-cell *matCellDef="let car">
        <button mat-icon-button color="primary" [routerLink]="['/cars', car._id]">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
